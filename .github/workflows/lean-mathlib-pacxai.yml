name: Build mathlib cache bundle

on:
  workflow_dispatch:

jobs:
  build-mathlib-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install system dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y zstd unzip zip tar curl git rsync coreutils

      - name: Install elan
        run: |
          set -euxo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Lean v4.30.0-rc2
        run: |
          set -euxo pipefail

          TOOLCHAIN="leanprover/lean4:v4.30.0-rc2"

          if elan toolchain list | grep -Fxq "$TOOLCHAIN"; then
            echo "Toolchain already installed: $TOOLCHAIN"
          else
            elan toolchain install "$TOOLCHAIN"
          fi

          elan default "$TOOLCHAIN"

          lean --version
          lake --version

      - name: Download mathlib4 source
        run: |
          set -euxo pipefail

          git clone --depth 1 https://github.com/leanprover-community/mathlib4.git mathlib4

          cd mathlib4
          echo "mathlib lean-toolchain:"
          cat lean-toolchain

          echo "Current commit:"
          git rev-parse HEAD

      - name: Force mathlib to Lean v4.30.0-rc2
        run: |
          set -euxo pipefail

          cd mathlib4

          echo "leanprover/lean4:v4.30.0-rc2" > lean-toolchain
          TOOLCHAIN="$(cat lean-toolchain)"

          if elan toolchain list | grep -Fxq "$TOOLCHAIN"; then
            echo "Toolchain already installed: $TOOLCHAIN"
          else
            elan toolchain install "$TOOLCHAIN"
          fi

          elan default "$TOOLCHAIN"

          lean --version
          lake --version

      - name: Download mathlib dependencies
        run: |
          set -euxo pipefail

          cd mathlib4

          lake update

          echo "Downloaded packages:"
          find .lake/packages -maxdepth 1 -mindepth 1 -type d -print | sort

          test -d .lake/packages

      - name: Get mathlib cache
        run: |
          set -euxo pipefail

          cd mathlib4

          # If cache retrieval partially fails, continue; target modules are built below.
          lake exe cache get || true

      - name: Build target mathlib modules
        run: |
          set -euxo pipefail

          cd mathlib4

          lake build Mathlib.InformationTheory.KullbackLeibler.Basic
          lake build Mathlib.InformationTheory.KullbackLeibler.ChainRule
          lake build Mathlib.Analysis.SpecialFunctions.BinaryEntropy
          lake build Mathlib.Probability.ConditionalProbability
          lake build Mathlib.Probability.ConditionalExpectation
          lake build Mathlib.Probability.Independence.Conditional
          lake build Mathlib.Probability.Distributions.Gaussian.Real
          lake build Mathlib.Probability.Distributions.Gaussian.Multivariate
          lake build Mathlib.InformationTheory.Hamming

      - name: Verify target .olean files exist
        run: |
          set -euxo pipefail

          cd mathlib4

          test -f .lake/build/lib/lean/Mathlib/InformationTheory/KullbackLeibler/Basic.olean
          test -f .lake/build/lib/lean/Mathlib/InformationTheory/KullbackLeibler/ChainRule.olean
          test -f .lake/build/lib/lean/Mathlib/Analysis/SpecialFunctions/BinaryEntropy.olean
          test -f .lake/build/lib/lean/Mathlib/Probability/ConditionalProbability.olean
          test -f .lake/build/lib/lean/Mathlib/Probability/ConditionalExpectation.olean
          test -f .lake/build/lib/lean/Mathlib/Probability/Independence/Conditional.olean
          test -f .lake/build/lib/lean/Mathlib/Probability/Distributions/Gaussian/Real.olean
          test -f .lake/build/lib/lean/Mathlib/Probability/Distributions/Gaussian/Multivariate.olean
          test -f .lake/build/lib/lean/Mathlib/InformationTheory/Hamming.olean

          echo "All target .olean files exist."

      - name: Make upload payload
        run: |
          set -euxo pipefail

          rm -rf payload
          mkdir -p payload

          cp mathlib4/lean-toolchain payload/lean-toolchain
          cp mathlib4/lake-manifest.json payload/lake-manifest.json || true
          cp mathlib4/lakefile.lean payload/lakefile.lean || true
          cp mathlib4/lakefile.toml payload/lakefile.toml || true

          mkdir -p payload/.lake

          # Dependency source packages.
          rsync -a mathlib4/.lake/packages payload/.lake/

          # mathlib build cache.
          mkdir -p payload/.lake/build
          rsync -a mathlib4/.lake/build/ payload/.lake/build/

          # Dependency build caches.
          for pkg in mathlib4/.lake/packages/*; do
            if [ -d "$pkg/.lake/build" ]; then
              name="$(basename "$pkg")"
              mkdir -p "payload/.lake/packages/$name/.lake"
              rsync -a "$pkg/.lake/build" "payload/.lake/packages/$name/.lake/"
            fi

            if [ -f "$pkg/lean-toolchain" ]; then
              name="$(basename "$pkg")"
              mkdir -p "payload/.lake/packages/$name"
              cp "$pkg/lean-toolchain" "payload/.lake/packages/$name/lean-toolchain"
            fi

            if [ -f "$pkg/lakefile.lean" ]; then
              name="$(basename "$pkg")"
              mkdir -p "payload/.lake/packages/$name"
              cp "$pkg/lakefile.lean" "payload/.lake/packages/$name/lakefile.lean"
            fi

            if [ -f "$pkg/lakefile.toml" ]; then
              name="$(basename "$pkg")"
              mkdir -p "payload/.lake/packages/$name"
              cp "$pkg/lakefile.toml" "payload/.lake/packages/$name/lakefile.toml"
            fi
          done

          cat > payload/README_UPLOAD_THIS.txt <<'EOF'
          mathlib4 cache bundle

          This bundle contains:
            payload/.lake/packages/*
            payload/.lake/build/*
            payload/lean-toolchain
            payload/lake-manifest.json

          Intended use after download:
            1. Put all mathlib4_cache_bundle.zip.partNNN files in one folder.
            2. Run:
                 cat mathlib4_cache_bundle.zip.part* > mathlib4_cache_bundle.zip
            3. Unzip mathlib4_cache_bundle.zip.
            4. Copy payload/.lake/packages into the mathlib root as .lake/packages.
            5. Copy payload/.lake/build into the mathlib root as .lake/build.
            6. Use Lean v4.30.0-rc2.

          This was produced by GitHub Actions.
          EOF

          echo "Payload size summary:"
          du -sh payload
          du -sh payload/.lake/packages || true
          du -sh payload/.lake/build || true

      - name: Zip upload payload
        run: |
          set -euxo pipefail

          rm -f mathlib4_cache_bundle.zip mathlib4_cache_bundle.zip.sha256

          zip -r -9 mathlib4_cache_bundle.zip payload

          echo "Bundle size:"
          ls -lh mathlib4_cache_bundle.zip

          sha256sum mathlib4_cache_bundle.zip | tee mathlib4_cache_bundle.zip.sha256

      - name: Split bundle into 480M parts and make manifest
        run: |
          set -euxo pipefail

          rm -rf upload_parts
          mkdir -p upload_parts

          # GNU split starts at 001 directly. No rename loop.
          split \
            -b 480M \
            -d \
            -a 3 \
            --numeric-suffixes=1 \
            mathlib4_cache_bundle.zip \
            upload_parts/mathlib4_cache_bundle.zip.part

          echo "Actual split files:"
          ls -lh upload_parts

          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for block in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(block)
              return h.hexdigest()

          original = Path("mathlib4_cache_bundle.zip")
          parts_dir = Path("upload_parts")
          parts = sorted(parts_dir.glob("mathlib4_cache_bundle.zip.part*"))

          if not parts:
              raise RuntimeError("No split parts were created.")

          manifest = {
              "bundle_type": "mathlib4_cache_bundle_from_github_actions",
              "lean_version": "leanprover/lean4:v4.30.0-rc2",
              "original_file": original.name,
              "original_size_bytes": original.stat().st_size,
              "original_size_mib": original.stat().st_size / (1024 * 1024),
              "original_sha256": sha256_file(original),
              "chunk_mib": 480,
              "parts": [
                  {
                      "filename": p.name,
                      "size_bytes": p.stat().st_size,
                      "size_mib": p.stat().st_size / (1024 * 1024),
                      "sha256": sha256_file(p),
                  }
                  for p in parts
              ],
              "reassemble_linux_command": "cat mathlib4_cache_bundle.zip.part* > mathlib4_cache_bundle.zip",
              "reassemble_macos_command": "cat mathlib4_cache_bundle.zip.part* > mathlib4_cache_bundle.zip",
              "upload_instruction": "Download/upload every .partNNN artifact plus the manifest. Keep filenames unchanged."
          }

          out = parts_dir / "mathlib4_cache_bundle.zip.manifest.json"
          out.write_text(json.dumps(manifest, indent=2), encoding="utf-8")

          print(json.dumps(manifest, indent=2))
          PY

          echo "Final upload parts:"
          ls -lh upload_parts

      - name: Verify split parts reassemble correctly
        run: |
          set -euxo pipefail

          rm -rf verify_reassembly
          mkdir -p verify_reassembly

          cp upload_parts/mathlib4_cache_bundle.zip.part* verify_reassembly/

          cd verify_reassembly
          cat mathlib4_cache_bundle.zip.part* > mathlib4_cache_bundle.zip

          cd ..

          ORIGINAL_SHA="$(sha256sum mathlib4_cache_bundle.zip | awk '{print $1}')"
          REASSEMBLED_SHA="$(sha256sum verify_reassembly/mathlib4_cache_bundle.zip | awk '{print $1}')"

          echo "Original SHA:    $ORIGINAL_SHA"
          echo "Reassembled SHA: $REASSEMBLED_SHA"

          test "$ORIGINAL_SHA" = "$REASSEMBLED_SHA"

          echo "Split/reassembly verification succeeded."

      - name: Verify expected part count is reasonable
        run: |
          set -euxo pipefail

          PART_COUNT="$(find upload_parts -maxdepth 1 -type f -name 'mathlib4_cache_bundle.zip.part*' | wc -l)"
          echo "Part count: $PART_COUNT"

          # For current approximately 1.9 GiB bundle and 480M parts, expect 4 or 5.
          # Keep this slightly flexible.
          test "$PART_COUNT" -ge 1
          test "$PART_COUNT" -le 10

      - name: Upload manifest as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-manifest
          path: upload_parts/mathlib4_cache_bundle.zip.manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload part001 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part001
          path: upload_parts/mathlib4_cache_bundle.zip.part001
          if-no-files-found: error
          retention-days: 7

      - name: Upload part002 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part002
          path: upload_parts/mathlib4_cache_bundle.zip.part002
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload part003 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part003
          path: upload_parts/mathlib4_cache_bundle.zip.part003
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload part004 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part004
          path: upload_parts/mathlib4_cache_bundle.zip.part004
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload part005 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part005
          path: upload_parts/mathlib4_cache_bundle.zip.part005
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload part006 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part006
          path: upload_parts/mathlib4_cache_bundle.zip.part006
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload part007 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part007
          path: upload_parts/mathlib4_cache_bundle.zip.part007
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload part008 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part008
          path: upload_parts/mathlib4_cache_bundle.zip.part008
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload part009 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part009
          path: upload_parts/mathlib4_cache_bundle.zip.part009
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload part010 as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-part010
          path: upload_parts/mathlib4_cache_bundle.zip.part010
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload checksum as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathlib-cache-full-zip-sha256
          path: mathlib4_cache_bundle.zip.sha256
          if-no-files-found: error
          retention-days: 7
